services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goalsync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - goalsync_pg:/var/lib/postgresql/data
  api:
    build:
      context: .
      target: api
    env_file:
      - apps/api/.env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
volumes:
  goalsync_pg:
